!
version 12.2(37)SE1
service timestamps log datetime msec
no service timestamps debug datetime msec
no service password-encryption
!
hostname HQ-DIST-SW02
!
enable secret 5 $1$mERr$9cTjUIEqNGurQiFU.ZeCi1
!
no profinet
no ip domain-lookup
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10,20,30,40,50 priority 4096
!
interface Port-channel1
 description LACP_TO_DIST_SW01
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,40,50,60,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
!
interface FastEthernet0/1
 description ETHERCHANNEL_TO_DIST_SW01
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,40,50,60,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 1 mode active
 no shutdown
!
interface FastEthernet0/2
 description ETHERCHANNEL_TO_DIST_SW01
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,40,50,60,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 1 mode active
 no shutdown
!
interface FastEthernet0/3
 description TRUNK_TO_ACC_SW01
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,40,50,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 no shutdown
!
interface FastEthernet0/4
 description TRUNK_TO_ACC_SW02
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 no shutdown
!
interface FastEthernet0/5
 description TRUNK_TO_ACC_SW03
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,40,50,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 no shutdown
!
interface GigabitEthernet0/1
 no ip address
 duplex auto
 speed auto
 shutdown
!
interface Vlan10
 mac-address 0060.4708.e901
 ip address 10.0.10.252 255.255.255.0
 standby 10 ip 10.0.10.249
 standby 10 priority 90
 standby 10 preempt
!
interface Vlan20
 ip address 10.0.20.252 255.255.255.0
 standby 20 ip 10.0.20.249
 standby 20 priority 90
 standby 20 preempt
!
interface Vlan30
 ip address 10.0.30.252 255.255.255.0
 standby 30 ip 10.0.30.249
 standby 30 priority 90
 standby 30 preempt
!
interface Vlan40
 ip address 10.0.40.252 255.255.255.0
 standby 40 ip 10.0.40.249
 standby 40 priority 90
 standby 40 preempt
!
interface Vlan50
 ip address 10.0.50.252 255.255.255.0
 standby 50 ip 10.0.50.249
 standby 50 priority 90
 standby 50 preempt
!
ip default-gateway 10.0.10.254
ip classless
!
snmp-server community grish RO
logging 10.0.40.40
!
line con 0
 password grish
 login
!
line aux 0
!
line vty 0 4
 password grish
 login
!
ntp server 10.0.40.20
!
end