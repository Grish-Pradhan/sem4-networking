!
version 15.1
no service timestamps log datetime msec
no service timestamps debug datetime msec
!
hostname ISP-2
!
no ip cef
no ipv6 cef
!
license udi pid CISCO2911/K9 sn FTX15240J5I-
!
spanning-tree mode pvst
!
interface Loopback0
 ip address 8.8.4.4 255.255.255.255
!
interface GigabitEthernet0/0
 description TO_ISP_1
 ip address 10.255.2.2 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/1
 description TO_ISP_3
 ip address 10.255.1.1 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 duplex auto
 speed auto
 shutdown
!
router bgp 65002
 bgp log-neighbor-changes
 neighbor 10.255.2.1 remote-as 65001
 neighbor 10.255.1.2 remote-as 65003
 !
 address-family ipv4
  neighbor 10.255.2.1 activate
  neighbor 10.255.1.2 activate
  network 8.8.4.4 mask 255.255.255.255
  default-information originate
 exit-address-family
!
ip classless
ip route 0.0.0.0 0.0.0.0 10.255.2.1
ip route 203.0.113.0 255.255.255.0 10.255.2.1
ip route 172.16.0.0 255.255.0.0 10.255.1.2
ip route 10.0.0.0 255.255.0.0 10.255.2.1
!
line con 0
!
line aux 0
!
line vty 0 4
!
end