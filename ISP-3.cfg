!
version 15.1
no service timestamps log datetime msec
no service timestamps debug datetime msec
!
hostname ISP-3
!
ip cef
no ipv6 cef
!
license udi pid CISCO2911/K9 sn FTX1524E7UH-
license boot module c2900 technology-package securityk9
!
spanning-tree mode pvst
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 no ip address
 duplex auto
 speed auto
 shutdown
!
interface GigabitEthernet0/1
 description TO_ISP_2
 ip address 10.255.1.2 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/2
 description TO_BRANCH_FW
 ip address 172.16.1.1 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
router bgp 65003
 bgp log-neighbor-changes
 neighbor 10.255.1.1 remote-as 65002
 neighbor 172.16.1.3 remote-as 65000
 !
 address-family ipv4
  neighbor 10.255.1.1 activate
  neighbor 172.16.1.3 activate
  network 1.1.1.1 mask 255.255.255.255
  network 172.16.1.0 mask 255.255.255.252
  default-information originate
 exit-address-family
!
ip classless
ip route 0.0.0.0 0.0.0.0 10.255.1.1
ip route 203.0.113.0 255.255.255.0 10.255.1.1
ip route 10.0.0.0 255.255.0.0 172.16.1.3
ip route 10.110.0.0 255.255.0.0 172.16.1.3
!
line con 0
!
line aux 0
!
line vty 0 4
!
end