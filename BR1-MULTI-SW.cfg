!
version 12.2(37)SE1
no service timestamps log datetime msec
no service timestamps debug datetime msec
no service password-encryption
!
hostname BR1-MULTI-SW
!
enable secret 5 $1$mERr$9cTjUIEqNGurQiFU.ZeCi1
!
no profinet
ip routing
!
spanning-tree mode rapid-pvst
spanning-tree vlan 110,120,130,140,150,999 priority 24576
!
interface FastEthernet0/1
 no switchport
 ip address 172.16.2.2 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
interface FastEthernet0/2
 description TRUNK_TO_BR1_ACC
 switchport trunk native vlan 999
 switchport trunk allowed vlan 110,120,130,140,150,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 no shutdown
!
interface FastEthernet0/3
 description TRUNK_TO_BR2_ACC
 switchport trunk native vlan 999
 switchport trunk allowed vlan 110,120,130,140,150,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 no shutdown
!
interface FastEthernet0/4
 description TRUNK_TO_BR_DHCP
 switchport access vlan 140
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/1
!
interface GigabitEthernet0/2
!
interface Vlan110
 mac-address 0001.42b8.1001
 ip address 10.110.10.3 255.255.255.0
 ip helper-address 172.16.2.50
!
interface Vlan120
 mac-address 0001.42b8.1002
 ip address 10.110.20.254 255.255.255.0
 ip helper-address 172.16.2.50
!
interface Vlan130
 mac-address 0001.42b8.1003
 ip address 10.110.30.254 255.255.255.0
 ip helper-address 172.16.2.50
!
interface Vlan140
 mac-address 0001.42b8.1004
 ip address 10.110.40.254 255.255.255.0
 ip helper-address 172.16.2.50
!
interface Vlan150
 mac-address 0001.42b8.1005
 ip address 10.110.50.254 255.255.255.0
 ip helper-address 172.16.2.50
!
router eigrp 100
 passive-interface default
 no passive-interface FastEthernet0/1
 network 172.16.2.0 0.0.0.255
 network 10.110.0.0 0.0.255.255
 no auto-summary
!
router ospf 1
 network 172.16.2.0 0.0.0.255 area 1
 network 10.110.0.0 0.0.255.255 area 1
!
ip classless
ip route 0.0.0.0 0.0.0.0 172.16.2.1
!
snmp-server community grish RO
!
line con 0
 password grish
 login
!
line aux 0
!
line vty 0 4
 password grish
 login
!
end