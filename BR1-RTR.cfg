!
version 15.1
no service timestamps log datetime msec
no service timestamps debug datetime msec
no service password-encryption
!
hostname BR1-RTR
!
enable secret 5 $1$mERr$9cTjUIEqNGurQiFU.ZeCi1
!
no ip cef
no ipv6 cef
!
license udi pid CISCO2911/K9 sn FTX15240LHK-
!
spanning-tree mode pvst
!
interface GigabitEthernet0/0
 description WAN-Link-to-ISP-BR1
 ip address 172.16.1.2 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/1
 description TO_BR_MULTISWITCH
 ip address 172.16.2.1 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 duplex auto
 speed auto
 shutdown
!
router ospf 1
 network 172.16.2.0 0.0.0.255 area 1
 network 10.110.0.0 0.0.255.255 area 1
 default-information originate
!
router eigrp 100
 network 172.16.2.0 0.0.0.255
 network 10.110.0.0 0.0.255.255
 no auto-summary
!
ip classless
ip route 0.0.0.0 0.0.0.0 172.16.1.1
ip route 10.0.0.0 255.255.0.0 172.16.1.1
ip route 203.0.113.0 255.255.255.0 172.16.1.1
ip route 198.51.100.0 255.255.255.252 172.16.1.1
!
snmp-server community grish RO
logging 10.0.40.40
!
line con 0
 password grish
 login
!
line aux 0
!
line vty 0 4
 password grish
 login
!
ntp server 10.0.40.20
!
end