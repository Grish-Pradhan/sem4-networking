!
! HQ-EDGE Router - ASBR with BGP
!
version 15.1
no service timestamps log datetime msec
no service timestamps debug datetime msec
no service password-encryption
!
hostname HO-EDGE-RTR
!
enable secret 5 $1$mERr$9cTjUIEqNGurQiFU.ZeCi1
!
no ip cef
no ipv6 cef
!
license udi pid CISCO2911/K9 sn FTX1524PN99-
!
spanning-tree mode pvst
!
interface GigabitEthernet0/0
 description Uplink-to-ISP
 ip address 203.0.113.1 255.255.255.0
 ip nat outside
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/1
 description TO_HQ_FW_OUTSIDE
 ip address 198.51.100.1 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/2
 no ip address
 duplex auto
 speed auto
 shutdown
!
router bgp 65000
 bgp log-neighbor-changes
 neighbor 203.0.113.254 remote-as 65001
 !
 address-family ipv4
  neighbor 203.0.113.254 activate
  network 203.0.113.0 mask 255.255.255.0
  network 198.51.100.0 mask 255.255.255.252
  network 10.0.0.0 mask 255.255.0.0
  default-information originate
 exit-address-family
!
router ospf 1
 network 10.0.0.0 0.0.255.255 area 0
 network 198.51.100.0 0.0.0.3 area 0
!
ip nat inside source list 1 interface GigabitEthernet0/0 overload
ip classless
ip route 0.0.0.0 0.0.0.0 203.0.113.254
ip route 198.51.100.0 255.255.255.252 198.51.100.2 1
ip route 10.0.0.0 255.255.0.0 198.51.100.2 1
ip route 172.16.0.0 255.255.0.0 203.0.113.254
ip route 10.110.0.0 255.255.0.0 203.0.113.254
!
access-list 1 permit 10.0.0.0 0.255.255.255
ip access-list extended VPN-TO-BRANCH1
 permit ip 10.0.0.0 0.255.255.255 10.110.0.0 0.0.255.255
!
line con 0
 password grish
 login
!
line aux 0
!
line vty 0 4
 password grish
 login
!
end