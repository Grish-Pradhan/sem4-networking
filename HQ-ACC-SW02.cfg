!
version 15.0
no service timestamps log datetime msec
no service timestamps debug datetime msec
no service password-encryption
!
hostname HQ-ACC-SW02
!
enable secret 5 $1$mERr$9cTjUIEqNGurQiFU.ZeCi1
!
no ip domain-lookup
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
!
interface FastEthernet0/1
 description TRUNK_TO_DIST_SW01
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,999
 switchport mode trunk
 no shutdown
!
interface FastEthernet0/2
 description TRUNK_TO_DIST_SW02
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,40,50
 switchport mode trunk
 no shutdown
!
interface FastEthernet0/3
 description PC_IT
 switchport access vlan 40
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
 no shutdown
!
interface FastEthernet0/4
 description PC_Ops
 switchport access vlan 40
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
 no shutdown
!
interface FastEthernet0/5
 switchport access vlan 40
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface FastEthernet0/6
 switchport access vlan 40
 switchport mode access
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/1
!
interface GigabitEthernet0/2
!
interface Vlan10
 ip address 10.0.10.22 255.255.255.0
!
interface Vlan50
 ip address 192.168.50.12 255.255.255.0
!
ip default-gateway 10.0.10.254
!
snmp-server community grish RO
logging 172.20.0.15
!
line con 0
 password grish
 login
!
line aux 0
!
line vty 0 4
 password grish
 login
 line vty 5 15
 password grish
