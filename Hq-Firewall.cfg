ASA Version 9.6(1)
!
hostname ciscoasahq
password grish
enable password grish
names
!
interface GigabitEthernet1/1
 nameif inside
 security-level 100
 ip address 10.0.254.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet1/2
 nameif dmz
 security-level 50
 ip address 10.0.60.254 255.255.255.0
 no shutdown
!
interface GigabitEthernet1/3
 nameif outside
 security-level 0
 ip address 198.51.100.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet1/4
 no nameif
 no security-level
 shutdown
!
interface GigabitEthernet1/5
 no nameif
 no security-level
 shutdown
!
interface GigabitEthernet1/6
 no nameif
 no security-level
 shutdown
!
interface GigabitEthernet1/7
 no nameif
 no security-level
 shutdown
!
interface GigabitEthernet1/8
 no nameif
 no security-level
 shutdown
!
interface Management1/1
 management-only
 no nameif
 no security-level
 ip address 10.0.254.3 255.255.255.252
 no shutdown
!
route inside 10.0.0.0 255.255.0.0 10.0.254.1 1
route outside 0.0.0.0 0.0.0.0 198.51.100.1 1
route outside 203.0.113.0 255.255.255.0 198.51.100.1 1
route outside 172.16.0.0 255.255.0.0 198.51.100.1 1
route outside 10.110.0.0 255.255.0.0 198.51.100.1 1
!
access-list inside_in extended permit icmp any any
access-list inside_in extended permit ip any any
!
access-list dmz_in extended permit icmp any any
access-list dmz_in extended permit tcp any host 10.0.60.20 eq 80
access-list dmz_in extended permit tcp any host 10.0.60.20 eq 443
access-list dmz_in extended permit tcp any host 10.0.60.10 eq 53
!
access-list outside_in extended permit icmp any any
access-list outside_in extended permit tcp any host 10.0.60.20 eq 80
access-list outside_in extended permit tcp any host 10.0.60.20 eq 443
!
access-group inside_in in interface inside
access-group dmz_in in interface dmz
access-group outside_in in interface outside
!
object network obj-inside
 subnet 10.0.0.0 255.255.0.0
!
object network obj-dmz
 subnet 10.0.60.0 255.255.255.0
!
object network obj-web
 host 10.0.60.20
!
nat (inside,dmz) source static obj-inside obj-inside destination static obj-dmz obj-dmz
nat (outside,dmz) source static obj-web obj-web destination static obj-web obj-web
!
class-map inspection_default
 match default-inspection-traffic
!
policy-map type inspect dns preset_dns_map
 parameters
  message-length maximum 512
!
policy-map global_policy
 class inspection_default
  inspect dns preset_dns_map
  inspect ftp
  inspect tftp
  inspect icmp
!
service-policy global_policy global
!
telnet timeout 5
ssh timeout 5
!
crypto ipsec ikev1 transform-set SECURENET-SET esp-aes esp-sha-hmac
!
crypto map SECURENET-MAP 10 match address VPN-TRAFFIC
crypto map SECURENET-MAP 10 set peer 172.16.1.3
crypto map SECURENET-MAP 10 set ikev1 transform-set SECURENET-SET
crypto map SECURENET-MAP interface outside
!
crypto ikev1 enable outside
crypto ikev1 policy 10
 encr aes
 authentication pre-share
 group 2
 hash sha
 lifetime 86400
!
access-list VPN-TRAFFIC extended permit ip 10.0.0.0 255.255.0.0 10.110.0.0 255.255.0.0
!
tunnel-group 172.16.1.3 type ipsec-l2l
tunnel-group 172.16.1.3 ipsec-attributes
 ikev1 pre-shared-key grish123
!
line con 0
 password grish
!
line aux 0
!
line vty 0 4
 password grish
 login
!
snmp-server community grish
!
end