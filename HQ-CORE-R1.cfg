!
! HQ-CORE-R1 Router
!
version 15.1
service timestamps log datetime msec
no service timestamps debug datetime msec
service password-encryption
!
hostname HQ-CORE-R1
!
enable secret 5 $1$mERr$9cTjUIEqNGurQiFU.ZeCi1
!
ip cef
no ipv6 cef
!
license udi pid CISCO2911/K9 sn FTX1524MO5T-
!
ip domain-name securenet.local
ip ssh version 2
!
spanning-tree mode pvst
!
interface GigabitEthernet0/0
 description TRUNK_TO_HQ_DIST_SW01
 no ip address
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/0.10
 encapsulation dot1Q 10
 ip address 10.0.10.254 255.255.255.0
 ip helper-address 10.0.40.50
!
interface GigabitEthernet0/0.20
 encapsulation dot1Q 20
 ip address 10.0.20.254 255.255.255.0
 ip helper-address 10.0.40.50
!
interface GigabitEthernet0/0.30
 encapsulation dot1Q 30
 ip address 10.0.30.254 255.255.255.0
 ip helper-address 10.0.40.50
!
interface GigabitEthernet0/0.40
 encapsulation dot1Q 40
 ip address 10.0.40.254 255.255.255.0
 ip helper-address 10.0.40.50
!
interface GigabitEthernet0/0.50
 encapsulation dot1Q 50
 ip address 10.0.50.254 255.255.255.0
 ip helper-address 10.0.50.2
!
interface GigabitEthernet0/0.60
 encapsulation dot1Q 60
 ip address 10.0.60.253 255.255.255.0
!
interface GigabitEthernet0/2
 description TO_HQ_FW_INSIDE
 ip address 10.0.254.1 255.255.255.252
 duplex auto
 speed auto
 no shutdown
!
router eigrp 100
 passive-interface GigabitEthernet0/0
 network 10.0.0.0 0.0.255.255
 network 10.0.254.0 0.0.0.3
 no auto-summary
!
router ospf 1
 network 10.0.0.0 0.0.255.255 area 0
 network 10.0.254.0 0.0.0.3 area 0
!
ip classless
ip route 0.0.0.0 0.0.0.0 10.0.254.2 1
ip route 172.16.0.0 255.255.0.0 10.0.254.2 1
ip route 203.0.113.0 255.255.255.0 10.0.254.2 1
ip route 198.51.100.0 255.255.255.252 10.0.254.2 1
!
snmp-server community grish RO
!
logging 10.0.40.40
!
line con 0
 password grish
 login
!
line aux 0
!
line vty 0 4
 password grish
 login
 transport input telnet
!
ntp server 10.0.40.20
!
end